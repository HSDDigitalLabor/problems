<svg width="520" height="520" viewBox="0 0 520 520" xmlns="http://www.w3.org/2000/svg">
  <!-- Hintergrund -->
  <rect x="0" y="0" width="520" height="560" fill="#f3e5c8"/>

  <!-- Außenrahmen mit runden Ecken -->
  <rect x="35" y="25" width="460" height="460" rx="30" ry="30"
        fill="#f7e9cf" stroke="#e08a2a" stroke-width="8"/>

  <!-- Zellen-Hintergrund (leicht getönt) -->
  <defs>
    <pattern id="cellPattern" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect width="50" height="50" fill="#f7e9cf"/>
    </pattern>
  </defs>
  <rect x="45" y="35" width="430" height="430" fill="url(#cellPattern)"/>

  <!-- Dünne Gitterlinien -->
  <g stroke="#e0b47a" stroke-width="1">
    <!-- Vertikal -->
    <!-- 9 Spalten -->
    <!-- Spalten x = 45 + 50 * i -->
    <line x1="95" y1="35" x2="95" y2="475"/>
    <line x1="145" y1="35" x2="145" y2="475"/>
    <line x1="195" y1="35" x2="195" y2="475"/>
    <line x1="245" y1="35" x2="245" y2="475"/>
    <line x1="295" y1="35" x2="295" y2="475"/>
    <line x1="345" y1="35" x2="345" y2="475"/>
    <line x1="395" y1="35" x2="395" y2="465"/>
    <line x1="445" y1="35" x2="445" y2="475"/>

    <!-- Horizontal -->
    <!-- Zeilen y = 35 + 50 * j -->
    <line x1="45" y1="85"  x2="485" y2="85"/>
    <line x1="45" y1="135" x2="485" y2="135"/>
    <line x1="45" y1="185" x2="485" y2="185"/>
    <line x1="45" y1="235" x2="485" y2="235"/>
    <line x1="45" y1="285" x2="485" y2="285"/>
    <line x1="45" y1="335" x2="485" y2="335"/>
    <line x1="45" y1="385" x2="485" y2="385"/>
    <line x1="45" y1="435" x2="485" y2="435"/>
  </g>

  <!-- Dicke Linien für 3x3-Blöcke -->
  <g stroke="#e08a2a" stroke-width="4">
    <!-- Vertikal -->
    <line x1="195" y1="35" x2="195" y2="475"/>
    <line x1="345" y1="35" x2="345" y2="475"/>
    <!-- Horizontal -->
    <line x1="45" y1="185" x2="485" y2="185"/>
    <line x1="45" y1="335" x2="485" y2="335"/>
  </g>

  <!-- Zahlen: Matrix
       ["5","3","0","0","7","0","0","0","0"],
       ["6","0","0","1","9","5","0","0","0"],
       ["0","9","8","0","0","0","0","6","0"],
       ["8","0","0","0","6","0","0","0","3"],
       ["4","0","0","8","0","3","0","0","1"],
       ["7","0","0","0","2","0","0","0","6"],
       ["0","6","0","0","0","0","2","8","0"],
       ["0","0","0","4","1","9","0","0","5"],
       ["0","0","0","0","8","0","0","7","9"]
  -->
  <g fill="#e08a2a" font-family="sans-serif" font-size="28" text-anchor="middle" dominant-baseline="middle">
    <!-- Zeile 1 -->
    <text x="70"  y="60">5</text>
    <text x="120" y="60">3</text>
    <text x="270" y="60">7</text>

    <!-- Zeile 2 -->
    <text x="70"  y="110">6</text>
    <text x="220" y="110">1</text>
    <text x="270" y="110">9</text>
    <text x="320" y="110">5</text>

    <!-- Zeile 3 -->
    <text x="120" y="160">9</text>
    <text x="170" y="160">8</text>
    <text x="370" y="160">6</text>

    <!-- Zeile 4 -->
    <text x="70"  y="210">8</text>
    <text x="270" y="210">6</text>
    <text x="420" y="210">3</text>

    <!-- Zeile 5 -->
    <text x="70"  y="260">4</text>
    <text x="220" y="260">8</text>
    <text x="320" y="260">3</text>
    <text x="420" y="260">1</text>

    <!-- Zeile 6 -->
    <text x="70"  y="310">7</text>
    <text x="270" y="310">2</text>
    <text x="420" y="310">6</text>

    <!-- Zeile 7 -->
    <text x="120" y="360">6</text>
    <text x="370" y="360">2</text>
    <text x="420" y="360">8</text>

    <!-- Zeile 8 -->
    <text x="220" y="410">4</text>
    <text x="270" y="410">1</text>
    <text x="320" y="410">9</text>
    <text x="420" y="410">5</text>

    <!-- Zeile 9 -->
    <text x="270" y="460">8</text>
    <text x="420" y="460">7</text>
    <text x="470" y="460">9</text>
  </g>

  <!-- Kleiner Disclaimer -->
  <text x="260" y="510" font-family="sans-serif" font-size="16"
        text-anchor="middle" fill="#555">
    Generiert mit ChatGPT 30.11.2025
  </text>
</svg>
